{% extends 'myapp/base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/upload_product.css' %}" />

<div class="upload-container">
    <h2>Upload Product</h2>
    <p class="text-muted">Add your product details below.</p>

    <form method="post" enctype="multipart/form-data" action="{% url 'upload_product' %}">
        {% csrf_token %}

        <label for="id_image" class="form-label">Product Image</label>
        <input type="file" name="image" id="id_image" accept="image/*" class="form-control" required>

        <label for="id_category" class="form-label">Category</label>
        <select name="category" id="id_category" class="form-select" required>
            <option value="" selected disabled>Choose category</option>
            <option value="vegetables">Vegetables</option>
            <option value="fruits">Fruits</option>
            <option value="grains">Grains</option>
            <option value="other">Other</option>
        </select>

        <label for="id_name" class="form-label">Product Name</label>
        <input type="text" name="name" id="id_name" class="form-control" placeholder="Enter product name" required>

        <label for="id_about" class="form-label">About Product</label>
        <textarea name="about" id="id_about" class="form-textarea" placeholder="Write details about the product" required></textarea>

        <label for="id_price" class="form-label">Price (₹)</label>
        <input type="number" name="price" id="id_price" class="form-control" placeholder="Enter price" min="0" step="0.01" required>

        <button type="submit" class="btn-submit">Submit</button>
    </form>
</div>
{% endblock %}
