{% extends 'myapp/base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/contact.css' %}">
<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />

<div class="page-wrapper">
    <div class="profile-container text-center">
        <h2 class="mb-4">Contact Us</h2>
        <p class="text-muted mb-4">We'd love to hear from you. Fill out the form below.</p>

        <form method="post" action="{% url 'contact' %}">
            {% csrf_token %}
            
            <label for="id_name" class="form-label">Name</label>
            <input type="text" id="id_name" name="name" class="profile-input" placeholder="Your name" required>

            <label for="id_email" class="form-label">Email</label>
            <input type="email" id="id_email" name="email" class="profile-input" placeholder="your@example.com" required>

            <label for="id_message" class="form-label">Message</label>
            <textarea id="id_message" name="message" class="profile-input" placeholder="Write your message..." required rows="5"></textarea>

            <button type="submit" class="btn btn-success mt-3">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
